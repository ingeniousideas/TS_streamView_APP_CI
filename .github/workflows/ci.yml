name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | podman login docker.io -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build App Image
        run: |
          podman build -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/stream_view:${{ github.sha }} ./stream_view

      - name: Integration Smoke Test
        run: |
          # 1. Start and enable the Podman API socket service for the runner user
          systemctl --user start podman.socket
          
          # 2. Inform the compose plugin exactly where to find the active Podman socket
          export DOCKER_HOST="unix://$XDG_RUNTIME_DIR/podman/podman.sock"

          # 3. Spin up the testing profile containers injecting your built image configurations
          podman compose --profile testing up -d
          
          # Give containers time to initialize
          sleep 10
          
          # 4. Verify the application architecture responds through the proxy
          curl --fail http://localhost:8050 || exit 1
          
          # Clean up
          podman compose --profile testing down
        env:
          # Ensure your compose file uses the fresh images built by this pipeline commit
          # rather than pulling old configurations from the public registry.
          ENVIRONMENT: ${{ github.sha }}

      - name: Tag & Push Images to Registry
        run: |
          # Tag as latest alongside the specific commit SHA
          podman tag docker.io/${{ secrets.DOCKERHUB_USERNAME }}/stream_view:${{ github.sha }} docker.io/${{ secrets.DOCKERHUB_USERNAME }}/stream_view:latest
          
          # Push artifacts out to Docker Hub
          podman push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/stream_view:${{ github.sha }}
          podman push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/stream_view:latest
