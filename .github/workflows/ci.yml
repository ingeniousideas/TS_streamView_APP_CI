name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | podman login docker.io -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build App Images
        run: |
          podman build -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/stream_view:${{ github.sha }} ./stream_view
          podman build -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nginx_proxy:${{ github.sha }} ./nginx

      - name: Integration Smoke Test
        run: |
          # Use podman-compose to spin up the containers in the runner workspace
          podman compose --profile testing up -d
          sleep 10
          # Verify the application architecture responds through the proxy
          curl --fail http://localhost:8020 || exit 1
          podman compose --profile testing down

      - name: Tag & Push Images to Registry
        run: |
          # Tag as latest alongside the specific commit SHA
          podman tag docker.io/${{ secrets.DOCKERHUB_USERNAME }}/stream_view:${{ github.sha }} docker.io/${{ secrets.DOCKERHUB_USERNAME }}/stream_view:latest
          podman tag docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nginx_proxy:${{ github.sha }} docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nginx_proxy:latest
          
          # Push artifacts out to Docker Hub
          podman push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/stream_view:${{ github.sha }}
          podman push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/stream_view:latest
          podman push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nginx_proxy:${{ github.sha }}
          podman push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nginx_proxy:latest