# execute with
  # docker compose --profile dev up --build
services:
  ts-ui-server:
    image: docker.io/${DOCKERHUB_USERNAME:-devpatterns}/stream_view:${ENVIRONMENT:-dev}
    container_name: ts-ui-server
    build:
      context: ./stream_view
      args:
        BUILD_ENV: ${BUILD_ENV:-development}
    ports:
      - "8050:8050" # Explicitly bound to the host so the CI runner can curl localhost:8050
    profiles:
      - development
      - testing
      - production
    networks:
    - ts-ui-server

networks:
  ts-ui-server:
    name: ts-ui-server
    driver: bridge
    external: false